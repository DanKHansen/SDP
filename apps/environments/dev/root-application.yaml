apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sdp-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DanKHansen/SDP.git  # Placeholder — update when repo is public/private
    targetRevision: main
    path: apps/environments/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true